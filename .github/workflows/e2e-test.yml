name: E2E Tests

on:
  pull_request:
    branches: [main, 'release/**']

permissions:
  contents: read

jobs:
  e2e-test:
    runs-on:
      group: databricks-solutions-protected-runner-group
      labels: linux-ubuntu-latest

    permissions:
      # OIDC token exchange to authenticate against JFrog from an IT-managed runner.
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"  # uv-x86_64-unknown-linux-gnu.tar.gz

      - name: Setup for JFrog
        uses: ./.github/actions/jfrog-auth

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Install Python dependencies
        run: uv sync

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run dead code checks
        run: just lint-deadcode
        env:
          CI: true

      - name: Run frontend lint
        run: just ui-lint
        env:
          CI: true

      - name: Run frontend unit tests
        run: just ui-test-unit
        env:
          CI: true

      - name: Run Python unit tests
        run: just test-server
        env:
          CI: true

      - name: Run integration tests (Postgres)
        run: just test-integration --backend postgres
        env:
          CI: true

      - name: Run E2E tests
        run: |
          export ENVIRONMENT=development
          just e2e headless 4
        env:
          CI: true

      - name: Spec coverage gate
        run: uv run just spec-coverage-gate
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: test-screenshots
          path: client/test-results/
          retention-days: 7
